<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML = '<div style="background:#222; color:red; font-family:monospace; font-size:18px; padding:20px; z-index:999999; position:absolute; inset:0; overflow:auto;">' + 
          '<h2>REACT CRASH:</h2><p>' + e.message + '</p><pre>' + (e.error ? e.error.stack : '') + '</pre>' +
          '</div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
